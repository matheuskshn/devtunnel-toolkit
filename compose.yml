name: devtunnel-toolkit

services:
  devtunnel:
    image: ${DEVTUNNEL_IMAGE:-devtunnel-toolkit:local}
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    depends_on:
      squid:
        condition: service_healthy
      openvpn:
        condition: service_healthy
    volumes:
      - devtunnel-home:/home/devtunnel
    environment:
      PORTS: "${PORTS:-3140,53194}"
      TUNNEL_ID: "${TUNNEL_ID:-}"
      DEVTUNNEL_ACCESS_TOKEN: "${DEVTUNNEL_ACCESS_TOKEN:-}"
      ALLOW_ANONYMOUS: "${ALLOW_ANONYMOUS:-false}"
      PROTOCOL: "${PROTOCOL:-}"
      EXPIRATION: "${EXPIRATION:-}"
      VERBOSE: "${VERBOSE:-false}"
      LOGIN_PROVIDER: "${LOGIN_PROVIDER:-microsoft}"
    command: ["host"]

  squid:
    image: ${SQUID_IMAGE:-devtunnel-toolkit-squid:local}
    build:
      context: images/squid
      dockerfile: Dockerfile
    network_mode: host
    environment:
      SQUID_HTTP_PORT: "${SQUID_HTTP_PORT:-3140}"
      SQUID_LISTEN_ADDRESS: "${SQUID_LISTEN_ADDRESS:-127.0.0.1}"
      SQUID_VISIBLE_HOSTNAME: "${SQUID_VISIBLE_HOSTNAME:-devtunnel-toolkit-squid}"
      SQUID_SSL_PORTS: "${SQUID_SSL_PORTS:-443 563 22}"
      SQUID_SAFE_PORTS: "${SQUID_SAFE_PORTS:-80 21 22 443 70 210 1025-65535 280 488 591 777}"
      SQUID_EXTRA_CONFIG: "${SQUID_EXTRA_CONFIG:-}"
    healthcheck:
      test: ["CMD-SHELL", "squid -k check -f /tmp/squid.conf >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  openvpn:
    image: ${OPENVPN_IMAGE:-devtunnel-toolkit-openvpn:local}
    build:
      context: images/openvpn
      dockerfile: Dockerfile
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - openvpn-data:/etc/openvpn
    environment:
      OVPN_PORT: "${OVPN_PORT:-53194}"
      OVPN_LISTEN_ADDRESS: "${OVPN_LISTEN_ADDRESS:-127.0.0.1}"
      OVPN_PROTO: "${OVPN_PROTO:-tcp}"
      OVPN_NETWORK: "${OVPN_NETWORK:-10.8.0.0}"
      OVPN_NETMASK: "${OVPN_NETMASK:-255.255.255.0}"
      OVPN_CIDR: "${OVPN_CIDR:-10.8.0.0/24}"
      OVPN_CLIENT_NAME: "${OVPN_CLIENT_NAME:-devtunnel-toolkit}"
      OVPN_REMOTE_HOST: "${OVPN_REMOTE_HOST:-127.0.0.1}"
      OVPN_REMOTE_PORT: "${OVPN_REMOTE_PORT:-53194}"
      OVPN_PUSH_ROUTES: "${OVPN_PUSH_ROUTES:-10.0.0.0 255.0.0.0,172.16.0.0 255.240.0.0,192.168.0.0 255.255.0.0}"
      OVPN_DNS: "${OVPN_DNS:-}"
      OVPN_REDIRECT_GATEWAY: "${OVPN_REDIRECT_GATEWAY:-false}"
      OVPN_EXTRA_CONFIG: "${OVPN_EXTRA_CONFIG:-}"
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 >/dev/null 2>&1 && ss -ltn | grep -q \"127.0.0.1:$${OVPN_PORT}\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  devtunnel-home:
  openvpn-data:
