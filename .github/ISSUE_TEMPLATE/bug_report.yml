name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands and relevant output.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Image tag or devtunnel version
      placeholder: ghcr.io/mlsouza6/devtunnel-container:edge
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, and architecture.
